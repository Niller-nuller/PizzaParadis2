<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log ind - PizzaProjekt</title>
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<body>

<nav>
    <a class="brand" href="/">PizzaProjekt</a>
    <a th:href="@{/pizza/list}">Menu</a>
    <th:block th:if="${session.loggedInUser == null}">
        <a th:href="@{/user/login}">Log ind</a>
        <a th:href="@{/user/register}">Opret bruger</a>
    </th:block>
    <th:block th:if="${session.loggedInUser != null}">
        <span style="color:white; font-size:14px;" th:text="'Hej, ' + ${session.loggedInUser?.name}">Hej</span>
        <a th:href="@{/user/logout}">Log ud</a>
    </th:block>
</nav>

<div class="container">
    <div class="form-box">
        <h2>Log ind</h2>
        <form th:action="@{/user/login}" method="post">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="din@email.dk" required>
            </div>
            <p th:if="${error}" th:text="${error}" style="color:red;"></p>
            <button type="submit" class="btn">Log ind</button>
        </form>
        <p>Ingen konto? <a th:href="@{/user/register}">Opret bruger her</a></p>
    </div>
</div>

</body>
</html>
